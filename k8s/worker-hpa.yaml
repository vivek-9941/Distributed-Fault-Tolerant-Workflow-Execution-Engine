apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-service
  template:
    metadata:
      labels:
        app: worker-service
    spec:
      containers:
        - name: worker-service
          image: worker-service:latest
          imagePullPolicy: Never
          resources:
            requests:
              cpu: "100m"
            limits:
              cpu: "500m"
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: app-config

---

apiVersion: v1
kind: Service
metadata:
  name: worker-service-svc
spec:
  selector:
    app: worker-service
  ports:
    - protocol: TCP
      port: 8083
      targetPort: 8083
  type: ClusterIP

---

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: worker-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: worker-service
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
